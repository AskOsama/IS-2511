<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Verification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:    #f4f0e6;
    --paper-2:  #ece6d6;
    --ink:      #21201b;
    --ink-soft: #5b574c;
    --line:     #c8c0aa;
    --accent:   #9a5b2e;
    --accent-d: #7c4622;
    --error:    #a8362b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Spline Sans', sans-serif;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(154,91,46,0.06), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(33,32,27,0.05), transparent 45%);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 24px 48px -24px rgba(33,32,27,0.35);
    padding: 44px 40px 36px;
    animation: rise 0.6s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 14px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 30px;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
  }

  .lead {
    color: var(--ink-soft);
    font-size: 14.5px;
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .rule {
    height: 1px;
    background: var(--line);
    margin: 0 0 26px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 9px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  input[type="text"] {
    width: 100%;
    font-family: 'Fraunces', serif;
    font-size: 22px;
    letter-spacing: 0.04em;
    color: var(--ink);
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 15px 16px;
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }

  input[type="text"]::placeholder {
    color: #b3ab94;
    letter-spacing: 0.02em;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(154,91,46,0.14);
  }

  input.invalid {
    border-color: var(--error);
    box-shadow: 0 0 0 3px rgba(168,54,43,0.13);
  }

  button {
    font-family: 'Spline Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: #f6f1e3;
    background: var(--accent);
    border: none;
    border-radius: 3px;
    padding: 15px 18px;
    cursor: pointer;
    transition: background 0.18s ease, transform 0.06s ease;
  }

  button:hover { background: var(--accent-d); }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: 0.65; cursor: default; }

  .msg {
    min-height: 18px;
    margin-top: 14px;
    font-size: 13px;
    line-height: 1.5;
  }

  .msg.error { color: var(--error); }
  .msg.ok { color: var(--accent-d); }

  .foot {
    margin-top: 26px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.55;
  }
</style>
</head>
<body>

  <main class="card">
    <div class="eyebrow">Examination Portal</div>
    <h1>Verify your student&nbsp;number</h1>
    <p class="lead">Enter your student number below to be directed to your assigned exam server.</p>

    <div class="rule"></div>

    <div class="field">
      <div>
        <label for="studentNumber">Student Number</label>
        <input
          type="text"
          id="studentNumber"
          inputmode="numeric"
          autocomplete="off"
          placeholder="e.g. 447955330"
          aria-describedby="msg">
      </div>
      <button id="submitBtn" type="button">Continue to exam</button>
    </div>

    <div class="msg" id="msg" role="status" aria-live="polite"></div>

    <div class="foot">
      You will be redirected automatically. If nothing happens, refresh the page and try again.
    </div>
  </main>

<script>
  // Destination servers
  var ODD_URL  = "https://quiz-platform-site3-699967266575.me-central1.run.app/verification?exam_token=d9415a44-fb24-4129-8b72-f3ddca03a517";
  var EVEN_URL = "https://quiz-platform-site4-699967266575.me-central1.run.app/verification?exam_token=d3bb643a-8e99-42ef-b216-dd3998a1cbd9";

  var input  = document.getElementById("studentNumber");
  var button = document.getElementById("submitBtn");
  var msg    = document.getElementById("msg");

  function setMessage(text, type) {
    msg.textContent = text;
    msg.className = "msg" + (type ? " " + type : "");
  }

  function handleSubmit() {
    var value = input.value.trim();

    // Validation: must be present and digits only
    if (value === "") {
      input.classList.add("invalid");
      setMessage("Please enter your student number.", "error");
      input.focus();
      return;
    }
    if (!/^\d+$/.test(value)) {
      input.classList.add("invalid");
      setMessage("Student number must contain digits only.", "error");
      input.focus();
      return;
    }

    input.classList.remove("invalid");

    // Parity is decided by the last digit — works for any length number
    var lastDigit = value.charAt(value.length - 1);
    var isEven = "02468".indexOf(lastDigit) !== -1;

    button.disabled = true;
    input.disabled = true;

    if (isEven) {
      setMessage("Even student number verified. Redirecting to your exam server\u2026", "ok");
      window.location.href = EVEN_URL;
    } else {
      setMessage("Odd student number verified. Redirecting to your exam server\u2026", "ok");
      window.location.href = ODD_URL;
    }
  }

  button.addEventListener("click", handleSubmit);

  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter") handleSubmit();
  });

  input.addEventListener("input", function () {
    if (input.classList.contains("invalid")) {
      input.classList.remove("invalid");
      setMessage("", "");
    }
  });

  input.focus();
</script>

</body>
</html>
